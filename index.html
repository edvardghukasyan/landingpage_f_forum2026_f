<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Agenda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px 8px;
      min-height: 100dvh;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      border-radius: 4px;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      position: sticky;
      top: 8px;
      z-index: 10;
    }

    .tab {
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      background: white;
      color: #555;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active {
      background: #e8a000;
      color: white;
    }

    .tab:not(.active):hover {
      background: #f0f0f0;
    }

    .pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .page-wrapper {
      display: none;
      width: 100%;
      justify-content: center;
    }

    .page-wrapper.active {
      display: flex;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #666;
      font-size: 1rem;
    }

    .error {
      color: #c00;
      text-align: center;
      padding: 2rem 1rem;
      line-height: 1.8;
    }
    .error a { color: #0066cc; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container" id="viewer">
    <div class="tabs" id="tabs">
      <button class="tab active" data-page="1">Hall 1</button>
      <button class="tab" data-page="2">Hall 2</button>
    </div>
    <div class="pages" id="pages">
      <div class="page-wrapper active" id="page-1">
        <div class="loading">Loading...</div>
      </div>
      <div class="page-wrapper" id="page-2">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    let pdfDoc = null;

    async function renderPage(pageNum) {
      const wrapper = document.getElementById('page-' + pageNum);
      if (!wrapper || !pdfDoc) return;

      const page = await pdfDoc.getPage(pageNum);
      const containerWidth = Math.min(
        document.getElementById('viewer').clientWidth,
        window.innerWidth - 16
      );
      const baseViewport = page.getViewport({ scale: 1 });
      const scale = containerWidth / baseViewport.width;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const viewport = page.getViewport({ scale: scale * dpr });

      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width  = containerWidth + 'px';
      canvas.style.height = Math.round(containerWidth * baseViewport.height / baseViewport.width) + 'px';

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      wrapper.innerHTML = '';
      wrapper.appendChild(canvas);
    }

    async function init() {
      try {
        pdfDoc = await pdfjsLib.getDocument('agenda.pdf').promise;
        await renderPage(1);
        await renderPage(2);
      } catch (err) {
        console.error(err);
        document.getElementById('pages').innerHTML =
          '<div class="error"><a href="agenda.pdf">Open PDF</a></div>';
      }
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page-wrapper').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('page-' + btn.dataset.page).classList.add('active');
      });
    });

    init();

    let timer;
    window.addEventListener('resize', () => {
      clearTimeout(timer);
      timer = setTimeout(async () => {
        if (pdfDoc) {
          await renderPage(1);
          await renderPage(2);
        }
      }, 300);
    });
  </script>
</body>
</html>
