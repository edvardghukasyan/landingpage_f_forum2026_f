<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ֆորում 2026 | Օրակարգ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    header {
      padding: 24px 16px;
      text-align: center;
      background: #0f3d5e;
      color: white;
    }
    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; opacity: 0.9; }
    main {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .button {
      display: inline-block;
      background: #0f3d5e;
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
    }
    iframe {
      width: 100%;
      height: 80vh;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: white;
    }
    @media (max-width: 600px) {
      header h1 { font-size: 22px; }
      iframe { height: 75vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Ֆորում 2026</h1>
    <p>Օրակարգ</p>
  </header>

  <main>
    <div class="card">
      <div class="actions">
        <a class="button" href="agenda.pdf" target="_blank">Բացել PDF-ը</a>
        <a class="button" href="agenda.pdf" download>Ներբեռնել PDF-ը</a>
      </div>

      <iframe src="agenda.pdf#toolbar=1&navpanes=0&scrollbar=1"></iframe>
    </div>
  </main>
</body>
</html>
