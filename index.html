<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Agenda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100dvh;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 8px;
      min-height: 100dvh;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      border-radius: 4px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #666;
      font-size: 1rem;
    }

    .error {
      color: #c00;
      text-align: center;
      padding: 2rem 1rem;
      line-height: 1.8;
    }
    .error a { color: #0066cc; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container" id="viewer">
    <div class="loading" id="loading">Loading...</div>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const PAGE_NUMBER = 1;

    async function renderPage() {
      try {
        const pdf = await pdfjsLib.getDocument('agenda.pdf').promise;
        const page = await pdf.getPage(PAGE_NUMBER);

        const containerWidth = Math.min(
          document.getElementById('viewer').clientWidth,
          window.innerWidth - 16
        );
        const baseViewport = page.getViewport({ scale: 1 });
        const scale = containerWidth / baseViewport.width;
        const dpr = Math.min(window.devicePixelRatio || 1, 3);
        const viewport = page.getViewport({ scale: scale * dpr });

        const canvas = document.createElement('canvas');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width  = containerWidth + 'px';
        canvas.style.height = Math.round(containerWidth * baseViewport.height / baseViewport.width) + 'px';

        await page.render({
          canvasContext: canvas.getContext('2d'),
          viewport
        }).promise;

        const viewer = document.getElementById('viewer');
        document.getElementById('loading')?.remove();
        viewer.appendChild(canvas);
      } catch (err) {
        console.error(err);
        document.getElementById('viewer').innerHTML =
          '<div class="error"><a href="agenda.pdf">Open PDF</a></div>';
      }
    }

    renderPage();

    let timer;
    window.addEventListener('resize', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        document.querySelector('canvas')?.remove();
        renderPage();
      }, 300);
    });
  </script>
</body>
</html>
