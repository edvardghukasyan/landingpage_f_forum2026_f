<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Agenda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px 8px;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      border-radius: 4px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #666;
      font-size: 1rem;
    }

    .error {
      color: #c00;
      text-align: center;
      padding: 2rem 1rem;
    }
    .error a { color: #0066cc; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container" id="viewer">
    <div class="loading" id="loading">Loading...</div>
  </div>

  <script type="module">
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    let pdfDoc = null;

    function getContainerWidth() {
      return Math.min(
        document.getElementById('viewer').clientWidth,
        window.innerWidth - 16
      );
    }

    async function renderPage(pageNum) {
      const page = await pdfDoc.getPage(pageNum);
      const containerWidth = getContainerWidth();
      const baseViewport = page.getViewport({ scale: 1 });
      const scale = containerWidth / baseViewport.width;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const viewport = page.getViewport({ scale: scale * dpr });

      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width  = containerWidth + 'px';
      canvas.style.height = Math.round(containerWidth * baseViewport.height / baseViewport.width) + 'px';
      canvas.dataset.page = pageNum;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      return canvas;
    }

    async function renderAll() {
      const viewer = document.getElementById('viewer');
      viewer.querySelectorAll('canvas').forEach(c => c.remove());

      for (let i = 1; i <= pdfDoc.numPages; i++) {
        const canvas = await renderPage(i);
        viewer.appendChild(canvas);
      }
    }

    async function init() {
      try {
        pdfDoc = await pdfjsLib.getDocument('agenda.pdf').promise;
        document.getElementById('loading')?.remove();
        await renderAll();
      } catch (err) {
        console.error(err);
        document.getElementById('viewer').innerHTML =
          '<div class="error"><a href="agenda.pdf">Open PDF</a></div>';
      }
    }

    init();

    let timer;
    window.addEventListener('resize', () => {
      clearTimeout(timer);
      timer = setTimeout(() => { if (pdfDoc) renderAll(); }, 300);
    });
  </script>
</body>
</html>
